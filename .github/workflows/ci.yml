name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Debug, Release]
        include:
          - os: ubuntu-latest
            cc: gcc
            cxx: g++
          - os: macos-latest
            cc: clang
            cxx: clang++
          - os: windows-latest
            cc: cl
            cxx: cl

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install CMakeHub
      run: pipx install cmakehub

    - name: Install CMake (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build clang-format clang-tidy gcc

    - name: Install CMake (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install cmake ninja clang-format llvm

    - name: Install CMake (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        choco install cmake ninja

    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DCMAKE_C_COMPILER=${{ matrix.cc }} \
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}

    - name: Run Tests
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          ./build/tests/Release/test_progress.exe
        else
          ./build/tests/test_progress
        fi

    - name: Code Coverage
      if: matrix.os == 'ubuntu-latest' && matrix.build_type == 'Debug'
      run: |
        cd build
        cmake -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-coverage -fprofile-arcs -ftest-coverage" ..
        cmake --build .
        ./tests/test_progress
        # Note: Header-only library doesn't generate coverage for library code
        echo "Code coverage skipped for header-only library"

    - name: Run clang-tidy
      if: matrix.os == 'ubuntu-latest'
      run: |
        cd build
        run-clang-tidy -p . include/cppbar/**/*.hpp

  format-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install clang-format
      run: sudo apt-get install -y clang-format

    - name: Check formatting
      run: |
        clang-format --dry-run -Werror include/cppbar/**/*.hpp tests/*.cpp examples/*.cpp

  code-quality:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install CMakeHub
      run: pipx install cmakehub

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build clang-format clang-tidy cppcheck

    - name: Configure
      run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

    - name: Build
      run: cmake --build build

    - name: Run clang-tidy
      run: |
        cd build
        run-clang-tidy -p . include/cppbar/**/*.hpp

    - name: Run cppcheck
      run: cppcheck --enable=all --inconclusive --std=c++17 include/cppbar/